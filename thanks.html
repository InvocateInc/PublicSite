        <script>
            (function () {
              const params = new URLSearchParams(window.location.search);
            
              const trackedFields = [
                "utm_source",
                "utm_medium",
                "utm_campaign",
                "utm_content",
                "utm_term"
              ];
            
              function getParam(name) {
                return params.get(name) || "";
              }
            
              function setCookie(name, value, days) {
                if (!value) return;
                const maxAge = days * 24 * 60 * 60;
                document.cookie =
                  encodeURIComponent(name) + "=" + encodeURIComponent(value) +
                  "; max-age=" + maxAge +
                  "; path=/; SameSite=Lax";
              }
            
              function getCookie(name) {
                const encodedName = encodeURIComponent(name) + "=";
                return document.cookie
                  .split("; ")
                  .find(row => row.startsWith(encodedName))
                  ?.slice(encodedName.length) || "";
              }
            
              function setField(name, value) {
                const field = document.querySelector(`[name="${name}"]`);
                if (field && value) {
                  field.value = value;
                }
              }
            
              // Save first-touch attribution for 90 days.
              trackedFields.forEach(function (field) {
                const value = getParam(field);
                if (value && !getCookie("first_" + field)) {
                  setCookie("first_" + field, value, 90);
                }
                if (value) {
                  setCookie("last_" + field, value, 90);
                }
              });
            
              if (!getCookie("first_landing_page")) {
                setCookie("first_landing_page", window.location.pathname, 90);
              }
            
              // Populate visible submission metadata.
              trackedFields.forEach(function (field) {
                setField(field, getParam(field) || getCookie("last_" + field) || getCookie("first_" + field));
              });
            
              setField("referrer", document.referrer || "");
              setField("landing_page", window.location.pathname);
              setField("first_landing_page", getCookie("first_landing_page") || window.location.pathname);
            
              // Simple fallback source category.
              const utmSource = getParam("utm_source") || getCookie("last_utm_source") || "";
              const referrer = document.referrer || "";
            
              let sourceCategory = "direct";
              if (utmSource) {
                sourceCategory = utmSource;
              } else if (referrer.includes("google.")) {
                sourceCategory = "google_organic";
              } else if (referrer.includes("linkedin.")) {
                sourceCategory = "linkedin_referral";
              } else if (referrer) {
                sourceCategory = "other_referral";
              }
            
              setField("source_category", sourceCategory);
            })();
            </script>
